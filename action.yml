name: "gitl review"
description: "AI review of git commits with risk scoring (low|medium|high). Sticky PR comment, CI gating. BYOK: OpenAI, Ollama, Azure."
branding:
  icon: "git-commit"
  color: "purple"

inputs:
  gitl-api-key:
    description: >-
      LLM API key (BYOK). Pass via secrets.GITL_API_KEY. If empty, gitl runs
      a deterministic offline review (no network call, no cost).
    required: false
    default: ""
  github-token:
    description: >-
      Token used to post the PR comment (via `gh` on GitHub, via the Gitea
      REST API on Gitea Actions). If left empty, falls back to the calling
      workflow's GITHUB_TOKEN at run time. On GitHub the workflow must grant
      it `pull-requests: write`.
    required: false
    default: ""
  fail-on:
    description: >-
      Risk threshold that fails the check (never|low|medium|high). Default is
      "never" — the Action only comments, it does not block merges, unless the
      caller opts in explicitly (project principle: default WARN, hard gate is
      explicit opt-in — docs/TECHNICAL_PLAN.md §9/§13).
    required: false
    default: "never"
  max-cost-usd:
    description: >-
      Cost guard passed through to `gitl review --max-cost-usd`. <=0 disables it.
    required: false
    default: "0.50"
  gitl-version:
    description: >-
      Git ref of akomyagin/gitl to build with `go install` (tag/branch/SHA).
      Defaults to the CLI version that ships with THIS action release —
      override only for testing (e.g. this repo's own action-selftest.yml
      pins it to the commit SHA under test, to exercise in-progress code
      before a tag exists).
    required: false
    default: "v0.5.1"
  base-sha:
    description: >-
      Base SHA of the range to review. If left empty, falls back to the
      triggering pull_request event's base SHA at run time.
    required: false
    default: ""
  head-sha:
    description: >-
      Head SHA of the range to review. If left empty, falls back to the
      triggering pull_request event's head SHA at run time.
    required: false
    default: ""
  pr-number:
    description: >-
      Pull request number to comment on. If left empty, falls back to the
      triggering pull_request event's number at run time.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.22"
        cache: true

    - name: Install gitl
      shell: bash
      run: go install "github.com/akomyagin/gitl/cmd/gitl@${{ inputs.gitl-version }}"

    - name: Run gitl review and post PR comment
      shell: bash
      env:
        # Secrets/tokens are passed ONLY via env:, never interpolated into the
        # run: script and never echoed (docs/TECHNICAL_PLAN.md §12.5). This
        # step also does not `set -x`, so GH Actions' log masking of secrets.*
        # values is never defeated by us printing the command line.
        #
        # github.* context is NOT allowed inside inputs.*.default (only
        # discovered when this action actually ran on GitHub — the composite
        # action manifest's top-level inputs: schema is evaluated before any
        # context is in scope), so inputs default to "" there and the
        # fallback to the pull_request event happens here instead, where
        # github.* is legitimately available.
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        GITL_API_KEY: ${{ inputs.gitl-api-key }}
        GITL_BASE_SHA: ${{ inputs.base-sha || github.event.pull_request.base.sha }}
        GITL_HEAD_SHA: ${{ inputs.head-sha || github.event.pull_request.head.sha }}
        GITL_FAIL_ON: ${{ inputs.fail-on }}
        GITL_MAX_COST_USD: ${{ inputs.max-cost-usd }}
        GITL_PR_NUMBER: ${{ inputs.pr-number || github.event.pull_request.number }}
        # Path of THIS action's checkout (not the workspace being reviewed) —
        # needed to locate ci/comment.sh when the action is consumed as
        # `uses: akomyagin/gitl@vX`. Passed via env, not interpolated into
        # the script, per the same rule as the secrets above.
        GITL_ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail

        # Fail fast (BEFORE any LLM spend) when the PR context is missing:
        # outside a pull_request event (push/workflow_dispatch/...) the
        # github.event.pull_request.* fallbacks above are all empty, which
        # would send a broken ".." range into `gitl review` and only surface
        # an opaque comment-posting error afterwards — after the LLM budget
        # is already spent. Same policy as bitbucket-pipe/pipe.sh's
        # fail-fast block and the GitLab component's merge_request_event
        # rule. This guard runs before the GitHub/Gitea platform fork below,
        # so the one check covers both platforms.
        if [ -z "$GITL_BASE_SHA" ] || [ -z "$GITL_HEAD_SHA" ] || [ -z "$GITL_PR_NUMBER" ]; then
          echo "gitl: base SHA, head SHA or PR number is empty (base='${GITL_BASE_SHA}' head='${GITL_HEAD_SHA}' pr='${GITL_PR_NUMBER}')." >&2
          echo "gitl: this action must run on a pull_request event, or be given explicit base-sha/head-sha/pr-number inputs." >&2
          exit 1
        fi

        GITL_RANGE="${GITL_BASE_SHA}..${GITL_HEAD_SHA}"

        # Single gitl invocation (one LLM call at most, §12.3): --format=json
        # carries both the review body (review_markdown) and the machine
        # risk level, so the comment body and the risk gate share one run.
        review_exit=0
        gitl review "$GITL_RANGE" \
          --format=json \
          --fail-on="$GITL_FAIL_ON" \
          --max-cost-usd="$GITL_MAX_COST_USD" \
          > review.json || review_exit=$?

        # Build the PR comment (comment.md) from review.json — including the
        # fallback notice when gitl itself failed. This rendering logic is
        # platform-neutral and shared with future Gitea/GitLab/Bitbucket
        # wrappers, so it lives in ci/comment.sh; only the run-URL below is
        # GitHub-specific, passed in as an opaque GITL_CI_RUN_URL.
        GITL_RANGE="$GITL_RANGE" \
        GITL_REVIEW_EXIT="$review_exit" \
        GITL_CI_RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
          bash "${GITL_ACTION_PATH}/ci/comment.sh"

        # Post the review BEFORE propagating the risk-gate exit code, so a
        # blocked (high-risk) PR still shows the reasoning, not just a bare
        # "job failed" (docs/TECHNICAL_PLAN.md §12.4.Б, same "show reasoning
        # before failing" principle as `gitl review --fail-on` itself).
        #
        # Sticky comment: if a previous gitl-review comment exists (matched by
        # the "<!-- gitl-review -->" marker), edit it in place instead of
        # posting a new one, so force-pushes don't spam the PR thread. The
        # marker is the first line of comment.md, so a startswith() match is
        # enough. GITHUB_REPOSITORY is provided by the runner (owner/repo).
        #
        # Platform fork: the `gh` CLI only speaks GitHub's API, so on Gitea
        # Actions the same two operations (find sticky comment, create/edit
        # it) go through Gitea's REST API with curl instead. Detection is
        # GITEA_ACTIONS=true, which Gitea's act_runner injects into every job
        # precisely so actions can tell the platforms apart (act_runner
        # internal/app/run/runner.go). On GitHub that variable is absent, so
        # the `gh` branch below is the pre-Gitea behaviour, unchanged apart
        # from re-indentation into the else-arm.
        if [ "${GITEA_ACTIONS:-}" = "true" ]; then
          # Gitea's runner sets GITHUB_API_URL to "<instance>/api/v1"
          # (gitea/act fork, pkg/runner/run_context.go); fall back to
          # GITHUB_SERVER_URL if it's unset. If neither is set (e.g. GITEA_ACTIONS
          # forced by hand outside a real Gitea runner), fail with a clear message
          # instead of an opaque "unbound variable" abort under `set -u`.
          if [ -z "${GITHUB_API_URL:-}" ] && [ -z "${GITHUB_SERVER_URL:-}" ]; then
            echo "::error::GITEA_ACTIONS=true but neither GITHUB_API_URL nor GITHUB_SERVER_URL is set — cannot determine the Gitea API base URL." >&2
            exit 1
          fi
          GITL_API_URL="${GITHUB_API_URL:-${GITHUB_SERVER_URL}/api/v1}"

          # Fail fast if there is no token to authenticate with: unlike
          # GitHub (where github.token always exists), a Gitea instance may
          # leave the github.token fallback empty or useless, and curl would
          # only surface an opaque 401/403 later. Same explicit-token-check
          # policy as the GitLab component and bitbucket-pipe/pipe.sh.
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "gitl: no API token available for the Gitea comment API — set the 'github-token' input." >&2
            echo "gitl: on Gitea Actions the workflow's github.token may be absent or lack permissions; pass a token with write access to the repository's issues/PRs." >&2
            exit 1
          fi

          # Gitea API auth header ("Authorization: token <t>",
          # docs.gitea.com/development/api-usage). The header is fed to curl
          # on stdin (-H @-), NOT as an argv element: argv is readable by
          # other processes on the runner host, env+stdin are not. Same
          # secrets-only-via-env discipline as the rest of this step; the
          # token never appears in the log either (no set -x, responses of
          # the mutating calls are discarded).
          gitea_api() {
            curl -sSf -H @- -H "Content-Type: application/json" "$@" \
              <<< "Authorization: token ${GH_TOKEN}"
          }

          # PRs are issues in Gitea's API, so the PR number is the issue
          # index. Explicit asc sort + `last` keeps "most recent match wins"
          # semantics regardless of the API's default ordering (same pattern
          # as the GitLab component's ?order_by=created_at&sort=asc). Gitea
          # returns issue comments in ascending creation order by default and
          # ignores unknown query parameters, so these params are best-effort
          # explicitness — TODO: verify the exact sort parameter names on a
          # real Gitea instance. One 100-item page is plenty for the sticky
          # marker on real-world PR threads.
          EXISTING_ID=$(gitea_api \
            "${GITL_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${GITL_PR_NUMBER}/comments?sort=created&direction=asc&limit=100" \
            | jq -r '[.[] | select(.body | startswith("<!-- gitl-review -->"))] | last | .id // empty')

          # JSON-encode the markdown body with jq (raw slurp) — no hand-rolled
          # escaping of quotes/newlines in the review text.
          jq -Rs '{body: .}' comment.md > comment.json

          if [ -n "$EXISTING_ID" ]; then
            gitea_api -X PATCH --data @comment.json \
              "${GITL_API_URL}/repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING_ID}" \
              > /dev/null
          else
            gitea_api -X POST --data @comment.json \
              "${GITL_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${GITL_PR_NUMBER}/comments" \
              > /dev/null
          fi
        else
          # Explicit asc sort + `last` keeps "most recent match wins"
          # semantics regardless of the API's default ordering (same pattern
          # as the GitLab component). GitHub documents per-issue comments as
          # ordered by ascending id and ignores unknown query parameters, so
          # sort/direction are best-effort explicitness; per_page=100 widens
          # the single scanned page (plenty for the sticky marker on
          # real-world PR threads).
          EXISTING_ID=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${GITL_PR_NUMBER}/comments?sort=created&direction=asc&per_page=100" \
            --jq '[.[] | select(.body | startswith("<!-- gitl-review -->"))] | last | .id // empty')

          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING_ID}" \
              --method PATCH \
              --field body="$(cat comment.md)"
          else
            gh pr comment "$GITL_PR_NUMBER" --body-file comment.md
          fi
        fi

        exit "$review_exit"
