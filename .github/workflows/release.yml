name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  # id-token: write is required for cosign keyless (OIDC) signing: goreleaser's
  # `signs` step exchanges this GitHub-issued OIDC token for a short-lived
  # Sigstore/Fulcio certificate, so no long-lived signing key is needed.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
