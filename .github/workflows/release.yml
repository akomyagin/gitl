name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  # id-token: write is required for cosign keyless (OIDC) signing: goreleaser's
  # `signs` step exchanges this GitHub-issued OIDC token for a short-lived
  # Sigstore/Fulcio certificate, so no long-lived signing key is needed.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.22'
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Verify action.yml version pin
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DEFAULT=$(grep -A15 'gitl-version:' action.yml | grep 'default:' | head -1 \
            | sed 's/.*default: *//; s/"//g; s/[[:space:]]//g')
          if [ "$DEFAULT" != "$TAG" ]; then
            printf 'ERROR: action.yml inputs.gitl-version.default="%s" does not match release tag "%s"\n' "$DEFAULT" "$TAG"
            echo 'Update action.yml inputs.gitl-version.default before tagging.'
            exit 1
          fi
          echo "OK: action.yml inputs.gitl-version.default=$DEFAULT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Compute artifact hashes
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum gitl_*.tar.gz gitl_*.zip checksums.txt | base64 -w0)" >> "$GITHUB_OUTPUT"

  provenance:
    needs: [release]
    permissions:
      actions: read    # read workflow run for provenance metadata
      id-token: write  # OIDC token for keyless signing
      contents: write  # upload provenance to the release
    # Pinned by tag, not commit SHA, deliberately deviating from this repo's
    # usual SHA-pin convention for third-party actions: slsa-github-generator's
    # own docs require its reusable workflows be referenced by tag (@vX.Y.Z) —
    # slsa-verifier resolves the trusted builder by tag, so a SHA pin here
    # makes every subsequent `slsa-verifier verify-artifact` fail with
    # "invalid ref: ... unexpected ref type" (confirmed by reproducing the
    # failure against the v0.4.0 release with the latest slsa-verifier).
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.release.outputs.hashes }}
      upload-assets: true
      # compile-generator builds the SLSA generator binary from Go source on the
      # runner instead of downloading a pre-compiled binary, avoiding glibc
      # compatibility failures on ubuntu-24.04 runners.
      compile-generator: true

  npm-publish:
    # The npm wrapper (npm/) has no binaries of its own: its install.js
    # downloads the release archives + checksums.txt that goreleaser just
    # uploaded, so publishing only makes sense after that job succeeds.
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # package.json carries the placeholder 0.0.0-dev; stamp the tag's version
      # (without the v prefix) so install.js downloads the matching release.
      - name: Stamp package version from tag
        working-directory: npm
        run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"

      # Until the secret is provisioned, skip publishing instead of failing
      # the release: the binaries are already out by this point.
      - name: Check NPM_TOKEN configured
        id: npm_token_check
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::warning::NPM_TOKEN secret is not set — skipping npm publish. Create it in repo settings (npm automation token) to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_token_check.outputs.skip != 'true'
        working-directory: npm
        env:
          # NPM_TOKEN is a repository secret that must be created manually in
          # GitHub repo settings (an npm automation token with publish rights
          # for the `gitl-cli` package). It is NOT provisioned by this repo.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

  docker-publish:
    # Bitbucket Pipe image (bitbucket-pipe/): pipes are Docker images by
    # definition, so the release ships a versioned image with the gitl binary
    # built from this tag's sources plus ci/comment.sh baked in (no runtime
    # fetch — the supply-chain property documented in bitbucket-pipe/pipe.sh).
    # `needs: [release]` orders it after the binaries like npm-publish —
    # an image tag should never exist for a tag whose release failed.
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Same version-sync invariant as "Verify action.yml version pin" in the
      # release job (docs/TECHNICAL_PLAN.md §12.2): the manifest's image tag
      # must match the release tag (without the "v" prefix), or consumers of
      # the pipe directory would pull an image built from different sources.
      - name: Verify pipe.yml image tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_IMAGE=$(grep -E '^image:' bitbucket-pipe/pipe.yml | sed 's/^image: *//; s/"//g; s/[[:space:]]//g')
          if [ "$MANIFEST_IMAGE" != "akomyagin/gitl-review-pipe:${VERSION}" ]; then
            printf 'ERROR: bitbucket-pipe/pipe.yml image="%s" does not match release tag "%s" (expected akomyagin/gitl-review-pipe:%s)\n' \
              "$MANIFEST_IMAGE" "$GITHUB_REF_NAME" "$VERSION"
            echo 'Update bitbucket-pipe/pipe.yml image: before tagging.'
            exit 1
          fi
          echo "OK: pipe.yml image=$MANIFEST_IMAGE"

      # Until the secrets are provisioned, skip publishing instead of failing
      # the release: the binaries are already out by this point (same pattern
      # as the NPM_TOKEN check above).
      - name: Check Docker Hub secrets configured
        id: dockerhub_check
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::warning::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets are not set — skipping Docker image publish. Create them in repo settings (Docker Hub access token with write scope for akomyagin/gitl-review-pipe) to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push pipe image
        if: steps.dockerhub_check.outputs.skip != 'true'
        env:
          # Secrets only via env (docs/TECHNICAL_PLAN.md §12.5): the token is
          # piped to `docker login` on stdin, never on argv, never echoed.
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="akomyagin/gitl-review-pipe"
          printf '%s' "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
          # Build args mirror goreleaser's ldflags so `gitl version` inside
          # the image reports this release (see bitbucket-pipe/Dockerfile).
          docker build -f bitbucket-pipe/Dockerfile \
            --build-arg GITL_VERSION="$VERSION" \
            --build-arg GITL_COMMIT="$GITHUB_SHA" \
            --build-arg GITL_DATE="$(git log -1 --format=%cI)" \
            -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
